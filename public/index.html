<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentOps Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="app-body">
    <div class="bg-orb bg-orb-left" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-right" aria-hidden="true"></div>

    <main class="app-shell" aria-label="AgentOps chat interface">
      <header class="topbar">
        <div class="brand-wrap">
          <p class="eyebrow">AgentOps - Phase 2</p>
          <h1>Engineering Agent Chat</h1>
        </div>
        <span class="status-pill" id="status-pill">Ready</span>
      </header>

      <section class="chat-card" aria-label="Agent chat panel">
        <div class="message-list" id="message-list" aria-live="polite"></div>

        <form class="composer" id="chat-form">
          <div class="control-row">
            <label class="field-label" for="agent-select">Routing</label>
            <select id="agent-select" name="agentId">
              <option value="">Auto-select best agent</option>
            </select>
            <button type="button" class="secondary-button" id="reset-button">New session</button>
          </div>

          <label class="field-label" for="question-input">Message</label>
          <textarea
            id="question-input"
            maxlength="4000"
            placeholder="Ask for architecture, backend, frontend, security, cloud, devops, or code review help..."
            required
          ></textarea>

          <div class="composer-footer">
            <p class="hint">Enter to send. Shift+Enter for newline.</p>
            <button type="submit" id="send-button">Send</button>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
